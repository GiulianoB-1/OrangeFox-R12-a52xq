name: Build OrangeFox R12 for Galaxy A52 5G

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: orangefox-a52xq-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-22.04
    timeout-minutes: 350

    env:
      FOX_BRANCH: "12.1"
      FOX_DIR: /home/runner/fox_12.1
      DEVICE: a52xq
      DEVICE_TREE: /home/runner/fox_12.1/device/samsung/a52xq
      PARTITION_SIZE: "81788928"
      CCACHE_DIR: /home/runner/.ccache

    steps:
      - name: Checkout R12 builder overlay
        uses: actions/checkout@v4

      - name: Free runner disk space
        run: |
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc /opt/hostedtoolcache/CodeQL
          sudo docker image prune --all --force || true
          sudo apt-get clean
          df -h

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            bc bison build-essential ccache cpio curl flex g++-multilib \
            gcc-multilib git git-lfs gnupg gperf imagemagick \
            lib32ncurses-dev lib32readline-dev lib32z1-dev libelf-dev \
            liblz4-tool libncurses5-dev libncurses-dev libsdl1.2-dev \
            libssl-dev libxml2 libxml2-utils lz4 lzop openjdk-11-jdk \
            pngcrush python3 python-is-python3 rsync schedtool \
            squashfs-tools unzip wget xsltproc xz-utils zip zlib1g-dev

      - name: Install repo tool
        run: |
          mkdir -p "$HOME/bin"
          curl -fsSL https://storage.googleapis.com/git-repo-downloads/repo -o "$HOME/bin/repo"
          chmod 0755 "$HOME/bin/repo"
          echo "$HOME/bin" >> "$GITHUB_PATH"

      - name: Configure ccache
        run: |
          ccache --max-size=8G
          ccache --set-config=compression=true
          echo "USE_CCACHE=1" >> "$GITHUB_ENV"
          echo "CCACHE_EXEC=$(command -v ccache)" >> "$GITHUB_ENV"

      - name: Cache compiler output
        uses: actions/cache@v4
        with:
          path: /home/runner/.ccache
          key: ofox-a52xq-12.1-${{ runner.os }}-${{ github.run_id }}
          restore-keys: |
            ofox-a52xq-12.1-${{ runner.os }}-

      - name: Sync current OrangeFox 12.1 source
        shell: bash
        run: |
          set -euo pipefail
          git clone --depth=1 https://gitlab.com/OrangeFox/sync.git "$HOME/OrangeFox_sync"
          cd "$HOME/OrangeFox_sync"
          ./orangefox_sync.sh --branch "$FOX_BRANCH" --path "$FOX_DIR"
          df -h

      - name: Clone proven A52 5G device tree
        run: |
          rm -rf "$DEVICE_TREE"
          git clone --depth=1 --branch fox_12.1 \
            https://github.com/itsaschoolbus-stuff/fox_device_samsung_a52xq.git \
            "$DEVICE_TREE"
          git -C "$DEVICE_TREE" log -1 --oneline

      - name: Apply working MicroSD and USB-OTG fixes
        run: |
          bash ./scripts/patch-device-tree.sh "$DEVICE_TREE"
          echo "----- Patched storage configuration -----"
          grep -nE 'MicroSD|USB-Storage|usb_otg|sdcard1' \
            "$DEVICE_TREE/recovery/root/system/etc/twrp.flags"
          echo "----- Patched imports -----"
          grep -n 'init.of_sdcard.rc' "$DEVICE_TREE/recovery/root/init.recovery.qcom.rc"
          echo "----- Patched properties -----"
          grep -nE 'isUsbOtgEnabled|oem.otg_support' "$DEVICE_TREE/system.prop"

      - name: Build OrangeFox recovery image
        shell: bash
        run: |
          set -o pipefail
          cd "$FOX_DIR"
          export ALLOW_MISSING_DEPENDENCIES=true
          export FOX_BUILD_DEVICE="$DEVICE"
          export LC_ALL=C
          export OF_DISABLE_MIUI_SPECIFIC_FEATURES=1
          export OF_FORCE_PREBUILT_KERNEL=1
          source build/envsetup.sh
          lunch twrp_a52xq-eng
          mka adbd recoveryimage 2>&1 | tee "$GITHUB_WORKSPACE/build.log"

      - name: Collect and verify build outputs
        shell: bash
        run: |
          set -euo pipefail
          PRODUCT="$FOX_DIR/out/target/product/$DEVICE"
          mkdir -p "$GITHUB_WORKSPACE/output"
          find "$PRODUCT" -maxdepth 1 -type f \
            \( -name 'OrangeFox*.img' -o -name 'OrangeFox*.zip' -o -name 'recovery.img' \) \
            -print -exec cp -v {} "$GITHUB_WORKSPACE/output/" \;

          IMAGE="$(find "$GITHUB_WORKSPACE/output" -maxdepth 1 -type f -name 'OrangeFox*.img' | head -n1)"
          if [[ -z "$IMAGE" ]]; then
            IMAGE="$GITHUB_WORKSPACE/output/recovery.img"
          fi
          test -f "$IMAGE"

          python3 "$GITHUB_WORKSPACE/scripts/verify-built-image.py" \
            "$IMAGE" --partition-size "$PARTITION_SIZE" | tee "$GITHUB_WORKSPACE/verification.txt"
          sha256sum "$GITHUB_WORKSPACE/output"/* | tee "$GITHUB_WORKSPACE/SHA256SUMS.txt"
          ls -lh "$GITHUB_WORKSPACE/output"

      - name: Upload OrangeFox R12 build
        uses: actions/upload-artifact@v4
        with:
          name: OrangeFox-R12-a52xq-${{ github.run_number }}
          path: |
            output/*
            SHA256SUMS.txt
            verification.txt
          if-no-files-found: error
          retention-days: 30

      - name: Upload full build log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: OrangeFox-R12-a52xq-build-log-${{ github.run_number }}
          path: build.log
          if-no-files-found: warn
          retention-days: 14
